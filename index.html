<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SummerLovin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0 1rem;
            font-family: 'Inter', 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            background: #fffbe7;
        }
        h1 {
            font-size: 2rem;
            margin: 0.5rem;
            text-align: center;
        }
        #game-grid {
            display: grid;
            /* grid-template-columns and rows set dynamically by JS */
            gap: 4px;
            width: min(90vw, 90vh);
            height: min(90vw, 90vh);
            max-width: 98vw;
            max-height: 80vh;
            margin: 1rem auto;
            background: #f0e6d2;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .grid-cell, .sum-cell, .empty-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            min-width: 0;
            min-height: 0;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .grid-cell {
            background: #fff;
            border-radius: 4px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            user-select: none;
        }
        .sum-cell {
            background: #ffe082;
            color: #7c5700;
            color: rgba(128, 100, 0, 0.5);
            font-weight: 900;
            border-radius: 4px;
            font-size: 1.1rem;
            user-select: none;
        }
        .empty-cell {
            background: transparent;
            box-shadow: none;
        }
        /*
        .grid-cell.decoy {
            background: #f8bbd0;
            color: #a00040;
        }
        */
        .grid-cell.selected {
            background: #b2f2bb !important; /* green for correct selection */
            color: #155724 !important;
        }
        .grid-cell.faded {
            color: transparent !important;
            transition: color 0.3s;
        }
        .grid-cell.flash-wrong {
            background: #ff5252 !important;
            color: #fff !important;
            transition: background 0.2s;
        }
        .grid-cell.solved {
            background: #b3e5fc !important;
        }
        .current-sum {
            position: absolute;
            top: 0px;
            right: 4px;
            font-size: 0.7em;
            color: #000;
            font-weight: 400;
            font-family: 'Inter', 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            opacity: 1;
            letter-spacing: 0.01em;
        }
        @media (max-width: 600px), (max-height: 600px) {
            #game-grid {
                width: min(90vw, 70vh);
                height: min(90vw, 70vh);
                max-width: 90vw;
                max-height: 70vh;
            }
            .grid-cell, .sum-cell {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to SummerLovin</h1>
    <div style="text-align:center; margin-bottom:1rem;">
        <button id="seed-btn" style="font-size:1.2rem; padding:0.5em 1em; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer; margin-right:0.5em;">🔗</button>
        <button id="toggle-mode" style="font-size:1.5rem; padding:0.5em 1em; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer;"></button>
        <div id="lives" style="font-size:1.5rem; vertical-align:middle; margin-left:1em;">❤️❤️❤️</div>
    </div>
    <div id="game-grid"></div>
    <!-- Popup for game over -->
    <div id="game-over-popup" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; padding:2em 2em; text-align:center; max-width:90vw; margin:auto; box-shadow:0 4px 24px rgba(0,0,0,0.15);">
            <div style="font-size:2rem; margin-bottom:1rem;">Oh, snap—guess your summer love left you! 💔</div>
            <button id="restart-btn" style="font-size:1.2rem; padding:0.5em 1.5em; border-radius:8px; border:1px solid #ccc; background:#ffe082; cursor:pointer;">Restart</button>
        </div>
    </div>
    <!-- Popup for seed -->
    <div id="seed-popup" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; padding:2em 2em; text-align:center; max-width:90vw; margin:auto; box-shadow:0 4px 24px rgba(0,0,0,0.15);">
            <div style="font-size:1.2rem; margin-bottom:1rem;">Game Seed</div>
            <input id="seed-input" style="font-size:1.1rem; width:80%; padding:0.5em; margin-bottom:1em;" readonly />
            <br>
            <button id="copy-seed-btn" style="font-size:1rem; margin-right:1em; border-radius:6px; border:1px solid #ccc; background:#ffe082; cursor:pointer;">Copy</button>
            <button id="edit-seed-btn" style="font-size:1rem; margin-right:1em; border-radius:6px; border:1px solid #ccc; background:#ffe082; cursor:pointer;">Edit</button>
            <button id="apply-seed-btn" style="font-size:1rem; margin-right:1em; border-radius:6px; border:1px solid #ccc; background:#ffe082; cursor:pointer; display:none;">Apply</button>
            <button id="close-seed-btn" style="font-size:1rem; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer;">Close</button>
        </div>
    </div>
    <!-- jQuery (latest version from Google CDN) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- SummerLovin JavaScript file -->
    <script src="js/SummerLovin.js"></script>
</body>
</html>
