<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SummerLovin</title>
    <style>
        body {
            margin: 0;
            padding: 0 1rem;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            background: #fffbe7;
        }
        h1 {
            font-size: 2rem;
            margin-top: 1.5rem;
            text-align: center;
        }
        #game-grid {
            display: grid;
            /* grid-template-columns and rows set dynamically by JS */
            gap: 4px;
            width: min(90vw, 90vh);
            height: min(90vw, 90vh);
            max-width: 98vw;
            max-height: 80vh;
            margin: 1rem auto;
            background: #f0e6d2;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .grid-cell, .sum-cell, .empty-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100%;
        }
        .grid-cell {
            background: #fff;
            border-radius: 4px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            user-select: none;
        }
        .sum-cell {
            background: #ffe082;
            color: #7c5700;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1.1rem;
            user-select: none;
        }
        .empty-cell {
            background: transparent;
            box-shadow: none;
        }
        .grid-cell.decoy {
            background: #f8bbd0;
            color: #a00040;
        }
        .grid-cell.selected {
            background: #b2f2bb !important; /* green for correct selection */
            color: #155724 !important;
        }
        .grid-cell.faded {
            color: transparent !important;
            transition: color 0.3s;
        }
        .grid-cell.flash-wrong {
            background: #ff5252 !important;
            color: #fff !important;
            transition: background 0.2s;
        }
        @media (max-width: 600px), (max-height: 600px) {
            #game-grid {
                width: min(98vw, 70vh);
                height: min(98vw, 70vh);
                max-width: 98vw;
                max-height: 70vh;
            }
            .grid-cell, .sum-cell {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to SummerLovin</h1>
    <div style="text-align:center; margin-bottom:1rem;">
        <button id="toggle-mode" style="font-size:1.2rem; padding:0.5em 1em; border-radius:6px; border:1px solid #ccc; background:#ffe082; cursor:pointer;">
            ✅ Check Mode
        </button>
    </div>
    <div id="game-grid"></div>
    <!-- jQuery (latest version from Google CDN) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- SummerLovin JavaScript file -->
    <script src="js/SummerLovin.js"></script>
</body>
</html>
